name: Build Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Setup Android Project Fresh
        run: |
          rm -rf android
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Automate Versioning for Play Store
        run: |
          # Use GitHub Run Number to ensure unique and increasing version codes
          VERSION_CODE=$((10 + ${{ github.run_number }}))
          VERSION_NAME="1.1.${{ github.run_number }}"
          echo "Setting Version Code to $VERSION_CODE and Version Name to $VERSION_NAME"
          sed -i "s/versionCode 1/versionCode $VERSION_CODE/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"$VERSION_NAME\"/" android/app/build.gradle

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Setup Permanent Signing Keystore
        run: |
          if [ ! -f tasbih-permanent.keystore ]; then
            echo "Generating new permanent keystore..."
            keytool -genkey -v -keystore tasbih-permanent.keystore -alias tasbih-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass tasbih123 -keypass tasbih123 -dname "CN=Agung, OU=TasbihApp, O=Agung, L=Jakarta, S=Jakarta, C=ID"
            
            git config --local user.email "action@github.com"
            git config --local user.name "GitHub Action"
            git add tasbih-permanent.keystore
            git commit -m "Initialize permanent keystore [DO NOT DELETE]"
            git push origin main
          else
            echo "Using existing permanent keystore."
          fi
          
          echo "DUMPING SHA1 FOR GOOGLE PLAY SUPPORT:"
          keytool -list -v -keystore tasbih-permanent.keystore -alias tasbih-alias -storepass tasbih123 | grep SHA1

      - name: Build and Sign AAB
        working-directory: ./android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/../tasbih-permanent.keystore \
            -Pandroid.injected.signing.store.password=tasbih123 \
            -Pandroid.injected.signing.key.alias=tasbih-alias \
            -Pandroid.injected.signing.key.password=tasbih123 \
            --info

      - name: Upload Signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-signed-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Downloadable Keystore (SAVE THIS!)
        uses: actions/upload-artifact@v4
        with:
          name: tasbih-permanent-keystore
          path: tasbih-permanent.keystore
