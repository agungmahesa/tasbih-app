name: Build Android App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tasbih-app/package-lock.json

      - name: Install dependencies
        working-directory: ./tasbih-app
        run: npm install

      - name: Build web assets
        working-directory: ./tasbih-app
        run: npm run build

      - name: Sync Capacitor
        working-directory: ./tasbih-app
        run: npx cap sync android

      - name: Build Android App Bundle (AAB)
        working-directory: ./tasbih-app/android
        run: ./gradlew bundleRelease

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: tasbih-app/android/app/build/outputs/bundle/release/app-release.aab
